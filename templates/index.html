<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d3.js vine</title>
    <!-- import d3.js -->
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <!-- parse csv files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <!-- import css files -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/worker_info.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/content.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/execution_summary.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/execution_details.css') }}">
    <!-- import js files-->
    <script src="{{ url_for('static', filename='js/adjust_header.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/worker_info.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/display_current_time.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/execution_summary.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/execution_details.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/report.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/fetch_logs.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}" type="module"></script>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-logo">
            <img src="../static/imgs/taskvine_icon.svg" alt="Logo" id="header-logo">
            <div>
                <p id="taskvine-text">TaskVine</p>
                <p id="taskvine-version">V8.0.0</p>
            </div>
        </div>

        <div id="log-selector-div">
            <select id="log-selector">
                {% for folder in log_folders %}
                    <option value="{{ folder }}">{{ folder }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="sidebar-section-title">Report</div>

        <button data-target="#worker-info-title" id="worker-info-link" class="report-scroll-btn"></button>
        <button data-target="#worker-slot-function-execution-title" id="worker-slot-function-execution-link" class="report-scroll-btn"></button>
        <button data-target="#task-execution-summary-title" id="task-execution-summary-link" class="report-scroll-btn"></button>
        <button data-target="#average-cpu-usage-per-task-title" id="average-cpu-usage-per-task-link" class="report-scroll-btn"></button>
        <button data-target="#task-execution-time-distribution-title" id="task-execution-time-distribution-link" class="report-scroll-btn"></button>
        <button data-target="#vine-graphs-title" id="vine-graphs-link" class="report-scroll-btn"></button>

        <div class="sidebar-section-title">Manager Logs</div>
        <button id="log-debug-link"></a>
        
        <div class="sidebar-section-title">Library Logs</div>
    </div>

    <div id="header">
        <div id="header-left">
            <div id="header-top">
                <img src="../static/imgs/taskvine_icon.svg" alt="Logo" id="header-logo">
                <h1>TaskVine Report</h1>
            </div>
            <div id="header-bottom">
                <p>Generated on <span id="current-time"></span></p>
            </div>
        </div>
        <div id="header-right">
            <table>
                <tr>
                    <th>task count</th>
                    <td>3000</td> 
                    <th>worker count</th>
                    <td>1</td>
                    <th>per-worker cores</th>
                    <td>4</td>
                </tr>
                <tr>
                    <th>start time</th>
                    <td>xxx</td>
                    <th>end time</th>
                    <td>xxx</td>
                    <th>total time</th>
                    <td>xxx</td>
                </tr>
                <tr>
                    <th>lowest runtime</th>
                    <td>1</td>
                    <th>average runtime</th>
                    <td>1</td>
                    <th>longest runtime</th>
                    <td>1</td>
                </tr>
            </table>
        </div>
        <div id="header-button-wrapper">
            <button id="header-button"></button>
        </div>
    </div>


    <div id="content">
        
        <iframe id="contentFrame" src="/report" class="iframe-style"></iframe>

        <textarea id="log-text-debug" class="log-text" wrap="off" readonly></textarea>
        
    </div>

</body>
</html>
